apiversion : eksctl.io/v1alpha5
kind: ClusterConfig  

metadata:
  name: expense
  region: ap-south-1

iam:
  withOIDC: true
  withAddonPolicies:
    autoScaler: true
    externalDNS: true
    ebs: true
    albIngress: true

managedNodeGroups:
  - name: exp-workers
    instanceType: t3.small
    minSize: 2  
    maxSize: 5
    desiredCapacity: 3
    spot: true

    ssh:
      allow: true
      publicKeyName: t3

    labels:
      node-type: managed
      instance-type: spot


    tags:
      nodegroup-role: worker